#
# To publish a new version of the API
# git tag api/v1.2.3
# git push origin api/v1.2.3
#
name: Publish API

on:
  push:
    tags:
      - "api/v*.*.*"

jobs:
  publish-api:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Derive and validate image version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#api/v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid API version tag: $TAG"
            echo "Expected format: api/v1.2.3 or api/v1.2.3-preview.1"
            exit 1
          fi

          echo "IMAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/pulse-api"

          docker build \
            -f ./src/Pulse.Api/Dockerfile \
            -t "$IMAGE_NAME:${{ env.IMAGE_VERSION }}" \
            -t "$IMAGE_NAME:latest" \
            .

          docker push "$IMAGE_NAME:${{ env.IMAGE_VERSION }}"
          docker push "$IMAGE_NAME:latest"